<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Product Manager</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS for styling -->
    <style>
        body {
            background-color: #f4f7fc;
            font-family: 'Arial', sans-serif;
        }

        h1 {
            font-size: 2.5rem;
            color: #333;
            text-align: center;
            margin-top: 30px;
        }

        .container {
            max-width: 800px;
            margin-top: 50px;
        }

        .card {
            margin-top: 20px;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .form-group input {
            font-size: 1.2rem;
        }

        button {
            background-color: #007bff;
            color: white;
            font-size: 1.2rem;
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
        }

        button:hover {
            background-color: #0056b3;
        }

        .result-container {
            margin-top: 40px;
        }

        .download-btn {
            margin-top: 20px;
            font-size: 1.1rem;
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border-radius: 5px;
            text-decoration: none;
        }

        .download-btn:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 AI Product Manager</h1>

        <div class="card">
            <form id="product-form">
                <div class="mb-3">
                    <label for="product-name" class="form-label">产品名称</label>
                    <input type="text" class="form-control" id="product-name" placeholder="输入产品名称" required>
                </div>
                <button type="submit" class="btn">生成报告</button>
            </form>
        </div>

        <div id="result" class="result-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
