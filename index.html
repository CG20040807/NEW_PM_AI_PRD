<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Product Manager</title>

    <!-- Google Fonts for elegance and readability -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS for clean layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">

    <!-- AOS (Animate On Scroll) for scroll animations -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- SweetAlert2 for pop-up modals -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.2.0/dist/sweetalert2.min.css" rel="stylesheet">

    <!-- Custom CSS for elegance -->
    <style>
        body {
            background-color: #f0f0f5;
            font-family: 'Roboto', sans-serif;
            color: #333;
            padding: 40px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            text-align: center;
            color: #333;
            margin-bottom: 50px;
        }

        .container {
            background-color: white;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 700px;
            margin: 0 auto;
        }

        .form-label {
            font-size: 1.5rem;
            color: #333;
            font-weight: 500;
        }

        .form-control {
            padding: 20px;
            font-size: 1.3rem;
            border-radius: 8px;
            border: 1px solid #ddd;
            background-color: #fafafa;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        button {
            background-color: #007bff;
            color: white;
            padding: 15px 25px;
            font-size: 1.2rem;
            border: none;
            border-radius: 12px;
            width: 100%;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #0056b3;
            cursor: pointer;
        }

        .result-container {
            margin-top: 40px;
            text-align: center;
        }

        .download-btn {
            font-size: 1.2rem;
            padding: 12px 25px;
            background-color: #28a745;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .download-btn:hover {
            background-color: #218838;
        }

        /* Animation for fade-in effect */
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .form-group {
            animation: fadeIn 1s ease-out;
        }
    </style>
</head>
<body>

    <h1 data-aos="fade-up">AI Product Manager</h1>

    <div class="container" data-aos="fade-up">
        <form id="product-form">
            <div class="mb-3 form-group">
                <label for="product-name" class="form-label">产品名称</label>
                <!-- Add 'id' and 'name' attributes to the input field -->
                <input type="text" class="form-control" id="product-name" name="product-name" placeholder="输入产品名称" required>
            </div>
            <button type="submit" class="btn" data-aos="fade-up" data-aos-delay="400">生成报告</button>
        </form>

        <div id="result" class="result-container"></div>
    </div>

    <!-- Bootstrap JS for interactivity -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- AOS JS for scroll animations -->
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

    <!-- SweetAlert2 for pop-up modals -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.2.0/dist/sweetalert2.all.min.js"></script>

    <!-- Custom JavaScript -->
    <script src="index.js"></script>

</body>
</html>
