<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Product Manager</title>

    <!-- Google Fonts for artistic feel -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS for layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">

    <!-- AOS (Animate On Scroll) for scroll animations -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- SweetAlert2 for pop-up modals -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.2.0/dist/sweetalert2.min.css" rel="stylesheet">

    <!-- Custom CSS for styling -->
    <style>
        /* General Styles */
        body {
            background: linear-gradient(135deg, #6e7f80 0%, #3b607d 100%);
            font-family: 'Roboto', sans-serif;
            padding: 60px;
            color: #fff;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
            color: #fff;
            text-shadow: 4px 4px 15px rgba(0, 0, 0, 0.2);
            margin-bottom: 50px;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 40px;
            max-width: 900px;
            margin: auto;
            backdrop-filter: blur(15px);
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.3);
        }

        .form-label {
            font-size: 1.5rem;
            color: #fff;
        }

        .form-control {
            padding: 20px;
            font-size: 1.3rem;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: #333;
        }

        button {
            background-color: #ff5722;
            color: white;
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 12px;
            width: 100%;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #e64a19;
            transform: scale(1.05);
        }

        .result-container {
            margin-top: 40px;
            text-align: center;
        }

        .download-btn {
            font-size: 1.2rem;
            padding: 12px 25px;
            background-color: #4CAF50;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .download-btn:hover {
            background-color: #388e3c;
            transform: scale(1.05);
        }

        /* Animation for form fade-in */
        .form-group {
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

    </style>
</head>
<body>

    <h1 data-aos="fade-up">🚀 AI Product Manager</h1>

    <div class="container">
        <form id="product-form">
            <div class="mb-3 form-group" data-aos="fade-up" data-aos-delay="200">
                <label for="product-name" class="form-label">产品名称</label>
                <input type="text" class="form-control" id="product-name" placeholder="输入产品名称" required>
            </div>
            <button type="submit" class="btn" data-aos="fade-up" data-aos-delay="400">生成报告</button>
        </form>

        <div id="result" class="result-container"></div>
    </div>

    <!-- Bootstrap JS for interactivity -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- AOS JS for scroll animations -->
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

    <!-- SweetAlert2 for pop-up modals -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.2.0/dist/sweetalert2.all.min.js"></script>

    <!-- Custom JavaScript -->
    <script src="index.js"></script>

</body>
</html>
