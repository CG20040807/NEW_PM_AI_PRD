<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Product Manager</title>

    <!-- Google Font for artistic feel -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS for layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS for styling -->
    <style>
        /* General Styles */
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            font-family: 'Poppins', sans-serif;
            color: #fff;
            padding: 40px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 50px;
            color: #fff;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        }

        .container {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 40px;
            max-width: 800px;
            margin: auto;
            backdrop-filter: blur(10px);
        }

        .form-label {
            font-size: 1.2rem;
            color: #fff;
        }

        .form-control {
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #333;
        }

        button {
            background-color: #ff7f50;
            color: white;
            padding: 12px 24px;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            width: 100%;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #ff5722;
            transform: scale(1.05);
        }

        .result-container {
            margin-top: 40px;
            text-align: center;
        }

        .download-btn {
            font-size: 1.1rem;
            padding: 12px 20px;
            background-color: #4CAF50;
            color: white;
            border-radius: 5px;
            text-decoration: none;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .download-btn:hover {
            background-color: #388e3c;
            transform: scale(1.05);
        }

        /* Animation for form fade-in */
        .form-group {
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>🚀 AI Product Manager</h1>

    <div class="container">
        <form id="product-form">
            <div class="mb-3 form-group">
                <label for="product-name" class="form-label">产品名称</label>
                <input type="text" class="form-control" id="product-name" placeholder="输入产品名称" required>
            </div>
            <button type="submit" class="btn">生成报告</button>
        </form>

        <div id="result" class="result-container"></div>
    </div>

    <!-- Bootstrap JS for interactivity -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
